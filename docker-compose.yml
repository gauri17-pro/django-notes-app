services:
  
  nginx:
    build: 
      context: ./nginx 
    container_name: nginx-container
    ports:
      - "80:80"
    depends_on:
      django:
        condition: service_healthy 
    restart: always 
    networks:
      - notes-app

  django:
    build:
      context: .
    container_name: django_cont
    env_file: 
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db_cont:
        condition: service_healthy
    restart: always
    command: sh -c "python manage.py migrate --noinput && gunicorn notesapp.wsgi --bind 0.0.0.0:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/admin || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - notes-app

  db_cont:
    image: mysql
    container_name: db_cont
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - notes-app
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test_db
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:

networks:
  notes-app:
    driver: bridge
